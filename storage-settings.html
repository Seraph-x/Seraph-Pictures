<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seraph's Pictures</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260615" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=20260615" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="stylesheet" href="/theme.css?v=20260616" />
    <script>
      (function paintBackground() {
        try {
          var dark = false;
          try { dark = localStorage.getItem('themeMode') === 'dark'; } catch (error) {}
          var settings = {};
          try { settings = JSON.parse(localStorage.getItem('kvUiDesignSettings')) || {}; } catch (error) {}
          var base = dark ? '#1c1b19' : (settings.baseColor || '#fafaf8');
          var url = settings.globalBackgroundUrl || '';
          if (!url || !/^(https?:)?\/\/|^\//.test(url)) return;
          var safe = url.replace(/["\\]/g, function escape(character) { return '\\' + character; });
          function inject() {
            if (!document.body) return false;
            if (document.getElementById('kv-early-bg-layer')) return true;
            var layer = document.createElement('div');
            layer.id = 'kv-early-bg-layer';
            layer.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;background-color:' + base
              + ';background-image:url("' + safe + '");background-size:cover;background-position:center;background-repeat:no-repeat;';
            document.body.insertBefore(layer, document.body.firstChild);
            return true;
          }
          if (inject()) return;
          var observer = new MutationObserver(function observe() { if (inject()) observer.disconnect(); });
          observer.observe(document.documentElement, { childList: true });
        } catch (error) {}
      }());
    </script>
    <script src="/theme.js?v=20260305"></script>
    <script src="/i18n.js?v=20260611"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/legacy/pages/storage-settings.css?v=20260714" />
    <link rel="stylesheet" href="/claude-theme.css" />
    <link rel="stylesheet" href="/claude-layout.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 class="header-title">
          <img src="/logo.png" alt="Logo" class="header-logo" onerror="this.onerror=null;this.src='/favicon.ico';" />
          <span data-i18n="storage.title">存储设置</span>
        </h1>
        <div class="header-actions">
          <a class="action-link" href="./"><i class="fas fa-home"></i><span data-i18n="storage.home">首页</span></a>
          <a class="action-link" href="/admin.html"><i class="fas fa-folder-tree"></i><span data-i18n="storage.admin">管理后台</span></a>
          <button type="button" class="action-btn" data-i18n-toggle aria-label="切换语言"><span data-lang-label>EN</span></button>
          <button type="button" class="action-btn" data-theme-toggle data-i18n-aria-label="storage.toggleTheme" aria-label="切换主题">
            <i class="fas fa-moon" data-theme-icon></i>
          </button>
        </div>
      </header>

      <p class="intro" data-i18n="storage.intro">管理同类型的多个存储实例。密钥字段始终以掩码显示，留空或保持掩码不会覆盖现有密钥。</p>
      <div id="formRoot"><div class="loading" data-i18n="storage.loading">正在加载配置…</div></div>

      <div class="actionbar" id="actionbar" style="display:none;">
        <span id="saveStatus" class="status-line" data-i18n="storage.guestNote">访客通道独立于管理员存储实例</span>
        <div style="display:flex; gap:10px;">
          <button type="button" class="btn-ghost" id="reloadBtn"><i class="fas fa-rotate"></i> <span data-i18n="storage.reload">重新加载</span></button>
          <button type="button" class="btn-primary" id="saveBtn"><i class="fas fa-floppy-disk"></i> <span data-i18n="storage.saveGuest">保存访客通道</span></button>
        </div>
      </div>
    </main>

    <script src="/legacy/storage/api.js?v=20260714"></script>
    <script src="/legacy/storage/selection.js?v=20260714"></script>
    <script src="/legacy/storage/messages.js?v=20260714"></script>
    <script src="/legacy/storage/settings-renderer.js?v=20260714"></script>
    <script src="/legacy/storage/settings-controller.js?v=20260714"></script>
    <script>
      (function startStorageSettings() {
        var api = LegacyStorageApi.createStorageApi();
        var renderer = LegacyStorageRenderer.createSettingsRenderer({
          root: document.getElementById('formRoot'),
          documentRef: document
        });
        var controller = LegacyStorageController.createSettingsController({
          api: api,
          renderer: renderer,
          confirmDelete: function confirmProfile(name) {
            return window.confirm(LegacyStorageMessages.text('storage.confirmDelete') + name + '?');
          }
        });
        controller.start().catch(function report(error) {
          console.error('[storage-settings] startup failed', error);
        });
      }());
    </script>
  </body>
</html>
