name: pages-deploy

# Deploys the site to Cloudflare Pages (project "k-vault") via Wrangler.
# Mirrors the local `npm run pages:deploy`: build frontend/dist, then upload it
# together with the root-level functions/ directory (Pages Functions).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  the account that owns the Pages project

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys; never cancel an in-flight upload mid-flight.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend (vite + legacy assets)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy frontend/dist --project-name=k-vault --branch="${{ github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
